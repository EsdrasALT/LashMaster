<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Técnicas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list lines="full">
    @for (t of listaTecnicas(); track t.id) {
      <ion-item-sliding>
        
        <ion-item button (click)="abrirModal(t)">
          <ion-label>
            <h2>{{ t.nome }}</h2>
            <div class="ion-flex ion-align-items-center">
              <ion-icon name="cash-outline" size="small" color="medium"></ion-icon>
              <ion-text color="dark" class="ion-margin-start">
                {{ t.preco | currency:'BRL' }}
              </ion-text>
              <ion-icon name="time-outline" size="small" color="medium" class="ion-margin-start"></ion-icon>
              <ion-text color="dark" class="ion-margin-start">
                {{ t.tempoEstimado }}
              </ion-text>
            </div>
          </ion-label>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="remover(t.id)">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    } @empty {
      <p class="ion-text-center ion-padding">Nenhuma técnica cadastrada.</p>
    }
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="abrirModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  
</ion-content>
